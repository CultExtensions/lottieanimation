<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Critical for iframe embeds: dark color-scheme makes UAs paint opaque black behind transparent PNG/canvas gaps -->
  <meta name="color-scheme" content="light" />
  <title>Cult Connector Sync</title>
  <style>
    /**
     * Transparent chrome so parent page shows through SVG/lottie alpha (mock has transparent gutters).
     */
    html {
      background-color: transparent !important;
      background-image: none !important;
    }
    :root {
      --meta-fg: #6b7280;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background-color: transparent !important;
      background-image: none !important;
      color: var(--meta-fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    main {
      padding: 16px;
      width: min(100vw - 32px, calc(1380px + 24px));
      background-color: transparent !important;
      background-image: none !important;
    }
    #lottie {
      width: 100%;
      aspect-ratio: 1380 / 620;
      border-radius: 12px;
      overflow: hidden;
      background-color: transparent !important;
      background-image: none !important;
      box-shadow: none;
    }
    #lottie canvas {
      display: block;
      width: 100%;
      height: auto;
      background-color: transparent !important;
      background-image: none !important;
    }
    p.meta {
      margin: 12px 0 0;
      font-size: 13px;
      opacity: 0.85;
      text-align: center;
    }
    /** Full-page visitors keep caption; iframe embeds hide it and tighten padding */
    html.embedded .meta {
      display: none;
    }
    html.embedded body {
      min-height: 0;
      display: block;
      padding: 0;
    }
    html.embedded main {
      padding: 0;
      width: 100%;
      max-width: none;
    }
  </style>
</head>
<body>
  <script>
    if (window.self !== window.top) document.documentElement.classList.add('embedded');
  </script>
  <main>
    <div id="lottie" aria-label="Cult Connector Sync animation"></div>
    <p class="meta">Canvas + blob image URLs (visible). Latin stacked above Chinese in JSON (smooth crossfade).</p>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js" crossorigin="anonymous"></script>
  <script>
    (async function () {
      var container = document.getElementById('lottie');
      if (!window.lottie) {
        container.innerHTML = '<p>Failed to load lottie-web from CDN.</p>';
        return;
      }
      try {
        var animUrl = new URL('animation.json', window.location.href).href;
        var res = await fetch(animUrl);
        if (!res.ok) throw new Error('animation.json HTTP ' + res.status);
        var data = await res.json();

        var blobs = [];
        var assets = data.assets || [];
        for (var i = 0; i < assets.length; i++) {
          var a = assets[i];
          if (typeof a.p !== 'string' || !a.p.startsWith('data:image')) continue;
          var blob = await fetch(a.p).then(function (r) {
            return r.blob();
          });
          var url = URL.createObjectURL(blob);
          blobs.push(url);
          a.e = 0;
          a.u = '';
          a.p = url;
        }

        var anim = window.lottie.loadAnimation({
          container: container,
          renderer: 'canvas',
          loop: true,
          autoplay: true,
          animationData: data,
          rendererSettings: {
            preserveAspectRatio: 'xMidYMid meet',
            /** Match comp aspect for full-frame PNG layers (defaults to slice otherwise). */
            imagePreserveAspectRatio: 'xMidYMid meet',
            clearCanvas: true,
            hideOnTransparent: true,
          },
        });
        anim.addEventListener('DOMLoaded', function () {
          anim.goToAndPlay(0, true);
          container.style.backgroundColor = 'transparent';
          var canvases = container.querySelectorAll('canvas');
          for (var c = 0; c < canvases.length; c++) {
            canvases[c].style.backgroundColor = 'transparent';
          }
        });
        anim.addEventListener('destroy', function () {
          blobs.forEach(URL.revokeObjectURL);
        });
      } catch (err) {
        container.innerHTML = '<p style="padding:12px">Could not load animation: ' + String(err.message || err) + '</p>';
      }
    })();
  </script>
</body>
</html>
